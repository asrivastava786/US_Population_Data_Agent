<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>US Census Chat Agent</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:760px;margin:0 auto;padding:16px;background:#fafafa;color:#1a1a1a}
  h1{font-size:1.2rem}
  #log{border:1px solid #ddd;border-radius:10px;background:#fff;padding:12px;height:60vh;overflow-y:auto}
  .msg{margin:10px 0;line-height:1.45;white-space:pre-wrap}
  .user{font-weight:600}
  .bot{}
  .sql{font-family:ui-monospace,monospace;font-size:.78rem;color:#666;background:#f4f4f4;border-radius:6px;padding:6px 8px;margin-top:4px;overflow-x:auto}
  form{display:flex;gap:8px;margin-top:12px}
  input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:1rem}
  button{padding:10px 18px;border:0;border-radius:8px;background:#1a73e8;color:#fff;font-size:1rem;cursor:pointer}
  button:disabled{background:#9bb8e8}
  .hint{color:#777;font-size:.85rem}
</style>
</head>
<body>
<h1>US Census Chat Agent</h1>
<p class="hint">Ask about US population, income, employment, poverty, education, housing — national, state or county. Data: ACS 2016–2020 5-year estimates.</p>
<div id="log"></div>
<form id="f">
  <input id="q" autocomplete="off" placeholder="e.g. What is the population of Texas?" required>
  <button id="send">Send</button>
</form>
<script>
let sessionId = null;
const log = document.getElementById('log');
const form = document.getElementById('f');
const input = document.getElementById('q');
const btn = document.getElementById('send');

function add(cls, text, sql) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = (cls === 'user' ? 'You: ' : '') + text;
  if (sql) {
    const s = document.createElement('div');
    s.className = 'sql';
    s.textContent = sql;
    d.appendChild(s);
  }
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  add('user', message);
  input.value = ''; btn.disabled = true;
  const thinking = document.createElement('div');
  thinking.className = 'msg bot'; thinking.textContent = '…';
  log.appendChild(thinking);
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, session_id: sessionId})
    });
    const data = await r.json();
    sessionId = data.session_id;
    thinking.remove();
    add('bot', data.answer, data.sql);
  } catch (err) {
    thinking.remove();
    add('bot', 'Request failed: ' + err);
  } finally {
    btn.disabled = false; input.focus();
  }
});
</script>
</body>
</html>
